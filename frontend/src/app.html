<!doctype html>
<!--
  `data-theme` is set synchronously by the no-flash boot script below,
  before %sveltekit.head% and before first paint. v1 ships three
  bundled themes: `midnight-glass` (default dark), `default` (saved
  Tailwind palette), and `paper-light`. The `data-theme` attribute is
  the only switching surface — Tailwind color classes resolve through
  CSS variables, so flipping this attribute restyles the entire app
  with no component re-render.
-->
<html lang="en" class="h-full" data-theme="midnight-glass">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Bearings — Claude Code agent web UI" />
    <!-- Mobile browser chrome color. Initial value matches the
         midnight-glass base; the no-flash script below replaces it
         to match the resolved theme before first paint. -->
    <meta name="theme-color" content="#0A0E1C" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>Bearings</title>
    <!--
      Track B — no-flash theme boot (Themes & skins v1, design §4 Track B).
      Runs synchronously before %sveltekit.head% and before any stylesheet
      paints. Reads the cached preferences row (the same key
      `bearings:preferences-cache` that preferences.svelte.ts writes after
      every PATCH) so a reload in any theme paints the saved theme on the
      first frame instead of flashing midnight-glass and then re-applying.

      First-visit fallback (Track F): if no cache exists or the cached
      `theme` is null, read the OS color-scheme preference once and pick
      `paper-light` for light, `midnight-glass` otherwise. Once the user
      saves any theme via the picker, the cached value wins forever — we
      do NOT keep tracking the OS setting.

      Defensive: every read is try/catch'd. A broken localStorage entry,
      a private-mode browser, or a missing matchMedia leaves the default
      `data-theme="midnight-glass"` in place — same as today.
    -->
    <script>
      (function () {
        try {
          var THEME_COLORS = {
            'midnight-glass': '#0A0E1C',
            'default': '#020617',
            'paper-light': '#FAF7F0'
          };
          var theme = null;
          try {
            var raw = localStorage.getItem('bearings:preferences-cache');
            if (raw) {
              var parsed = JSON.parse(raw);
              if (parsed && typeof parsed.theme === 'string') {
                theme = parsed.theme;
              }
            }
          } catch (_) {
            /* parse error / quota / private mode — fall through to
               the OS-preference branch below. */
          }
          if (!theme) {
            var prefersLight =
              typeof window.matchMedia === 'function' &&
              window.matchMedia('(prefers-color-scheme: light)').matches;
            theme = prefersLight ? 'paper-light' : 'midnight-glass';
          }
          if (THEME_COLORS[theme]) {
            document.documentElement.dataset.theme = theme;
            var meta = document.querySelector('meta[name="theme-color"]');
            if (meta) meta.setAttribute('content', THEME_COLORS[theme]);
          }
        } catch (_) {
          /* swallowed: a broken boot script must never break the app.
             Default `data-theme` from the html tag stays in place. */
        }
      })();
    </script>
    %sveltekit.head%
    <!--
      Browser-side theme-diagnostic reporter. Snapshots what the live
      browser actually sees — CSS bundle URL, computed backdrop-filter
      on the first <aside>, resolved body background-image, active
      data-theme — and POSTs to /api/diag/theme, which appends one-line
      JSON to /tmp/bearings-theme-diag.log. Added 2026-04-23 so the
      agent can verify theme wiring without Dave opening DevTools.
      This tag can be removed once the theming investigation closes.
    -->
    <script>
      (function () {
        function snapshot() {
          try {
            var aside = document.querySelector('aside');
            var sheets = [];
            for (var i = 0; i < document.styleSheets.length; i++) {
              var s = document.styleSheets[i];
              if (s && s.href) sheets.push(s.href);
            }
            var bodyBg = getComputedStyle(document.body).backgroundImage || '';
            var report = {
              client_ts: new Date().toISOString(),
              url: location.href,
              user_agent: navigator.userAgent,
              data_theme: document.documentElement.dataset.theme || null,
              stylesheet_hrefs: sheets,
              aside_found: !!aside,
              aside_backdrop_filter: aside
                ? getComputedStyle(aside).backdropFilter ||
                  getComputedStyle(aside).webkitBackdropFilter ||
                  null
                : null,
              aside_background_color: aside
                ? getComputedStyle(aside).backgroundColor
                : null,
              aside_background_image: aside
                ? getComputedStyle(aside).backgroundImage
                : null,
              body_background_image_first_200: bodyBg.slice(0, 200),
              supports_backdrop_filter:
                (typeof CSS !== 'undefined' &&
                  CSS.supports &&
                  (CSS.supports('backdrop-filter', 'blur(1px)') ||
                    CSS.supports('-webkit-backdrop-filter', 'blur(1px)'))) ||
                false,
              viewport: {
                w: window.innerWidth,
                h: window.innerHeight,
                dpr: window.devicePixelRatio
              }
            };
            fetch('/api/diag/theme', {
              method: 'POST',
              headers: { 'content-type': 'application/json' },
              body: JSON.stringify(report),
              keepalive: true
            }).catch(function () {
              /* best-effort — if the endpoint is gone the reporter
                 quietly does nothing */
            });
          } catch (err) {
            /* swallowed on purpose: a broken diagnostic must never
               break the app. */
          }
        }
        // The first version of this fired on load + rAF + 50ms, which
        // ran BEFORE SvelteKit hydrated the <aside> components into the
        // DOM — the log came back with `aside_found: false`. Poll for
        // the aside up to 3 seconds so we capture its computed styles
        // once hydration has actually put it on the page. Still bails
        // after the budget so a perpetually-broken hydrate doesn't
        // leave the reporter spinning.
        var waited = 0;
        var STEP = 100;
        var BUDGET = 3000;
        function tick() {
          if (document.querySelector('aside') || waited >= BUDGET) {
            snapshot();
            return;
          }
          waited += STEP;
          setTimeout(tick, STEP);
        }
        if (document.readyState === 'complete') {
          requestAnimationFrame(tick);
        } else {
          window.addEventListener('load', function () {
            requestAnimationFrame(tick);
          });
        }
      })();
    </script>
  </head>
  <body class="h-full bg-slate-950 text-slate-100 font-sans antialiased">
    <div class="h-full">%sveltekit.body%</div>
  </body>
</html>
