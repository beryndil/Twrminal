<!doctype html>
<!--
  `data-theme` is set synchronously by the no-flash boot script below,
  before the SvelteKit head injection and before first paint. v1.0.0
  ships four bundled themes: `evergreen` (current default — forest-
  green flat dark, v1.0.0 dashboard target), `midnight-glass`
  (warm-navy glass), `default` (saved Tailwind palette), and
  `paper-light` (light cream). The `data-theme` attribute is the
  only switching surface — Tailwind color classes resolve through CSS
  variables, so flipping this attribute restyles the entire app with
  no component re-render.
-->
<html lang="en" class="h-full" data-theme="evergreen">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Bearings — Claude Code agent web UI" />
    <!-- Mobile browser chrome color. Initial value matches the
         evergreen base (the v1.0.0 default); the no-flash script
         below replaces it to match the resolved theme before first
         paint. -->
    <meta name="theme-color" content="#0E131B" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>Bearings</title>
    <!--
      Track B — no-flash theme boot (Themes & skins v1, design §4 Track B).
      Runs synchronously before the SvelteKit head injection and before
      any stylesheet paints. Reads the cached preferences row (the same key
      `bearings:preferences-cache` that preferences.svelte.ts writes after
      every PATCH) so a reload in any theme paints the saved theme on the
      first frame instead of flashing the default and then re-applying.

      First-visit fallback (Track F): if no cache exists or the cached
      `theme` is null, read the OS color-scheme preference once and pick
      `paper-light` for light, `evergreen` otherwise. Once the user
      saves any theme via the picker, the cached value wins forever — we
      do NOT keep tracking the OS setting.

      v1.0.0 (Phase 7 of the dashboard redesign): default flipped from
      `midnight-glass` to `evergreen` to match the v1.0.0 mockup. Existing
      users keep whatever they last saved — the localStorage cache wins
      every reload — so this change only affects fresh installs and
      private-mode tabs.

      Defensive: every read is try/catch'd. A broken localStorage entry,
      a private-mode browser, or a missing matchMedia leaves the default
      `data-theme="evergreen"` in place.
    -->
    <script>
      (function () {
        try {
          // SYNC WITH `src/lib/themes/meta-theme-colors.ts` —
          // this script runs synchronously before any module loads
          // (so it can't `import`), so the literal is duplicated
          // here. `preferences.svelte.ts.checkBootDrift()` runs at
          // init and `console.warn`s if the two ever diverge.
          var THEME_COLORS = {
            'midnight-glass': '#0A0E1C',
            default: '#020617',
            'paper-light': '#FAF7F0',
            evergreen: '#0E131B',
          };
          var theme = null;
          try {
            var raw = localStorage.getItem('bearings:preferences-cache');
            if (raw) {
              var parsed = JSON.parse(raw);
              if (parsed && typeof parsed.theme === 'string') {
                theme = parsed.theme;
              }
            }
          } catch (_) {
            /* parse error / quota / private mode — fall through to
               the OS-preference branch below. */
          }
          if (!theme) {
            var prefersLight =
              typeof window.matchMedia === 'function' &&
              window.matchMedia('(prefers-color-scheme: light)').matches;
            theme = prefersLight ? 'paper-light' : 'evergreen';
          }
          if (THEME_COLORS[theme]) {
            document.documentElement.dataset.theme = theme;
            var meta = document.querySelector('meta[name="theme-color"]');
            if (meta) meta.setAttribute('content', THEME_COLORS[theme]);
          }
        } catch (_) {
          /* swallowed: a broken boot script must never break the app.
             Default `data-theme` from the html tag stays in place. */
        }
      })();
    </script>
    %sveltekit.head%
  </head>
  <body class="h-full bg-slate-950 font-sans text-slate-100 antialiased">
    <div class="h-full">%sveltekit.body%</div>
  </body>
</html>
