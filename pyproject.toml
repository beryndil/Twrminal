[project]
name = "twrminal"
version = "0.1.7"
description = "Localhost web UI for Claude Code agent sessions."
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.11"
authors = [{ name = "Dave Hennigan" }]
keywords = ["claude", "agent", "web-ui"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3 :: Only",
]
dependencies = [
    "fastapi>=0.115",
    "uvicorn[standard]>=0.32",
    "websockets>=13",
    "claude-agent-sdk>=0.1",
    "pydantic>=2.8",
    "pydantic-settings>=2.5",
    "tomli-w>=1.0",
    "prometheus-client>=0.21",
    "aiosqlite>=0.20",
]

[project.scripts]
twrminal = "twrminal.cli:main"

[project.urls]
Repository = "https://github.com/Beryndil/Twrminal"

[dependency-groups]
dev = [
    "pytest>=8.3",
    "pytest-asyncio>=0.24",
    "httpx>=0.27",
    "ruff>=0.8",
    "mypy>=1.11",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/twrminal"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]

[tool.mypy]
python_version = "3.12"
strict = true
packages = ["twrminal"]
mypy_path = "src"

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
