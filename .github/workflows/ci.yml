# CI for Bearings v1 rebuild — runs every gate referenced by the master
# checklist's Done-when criteria. Anything that fails here is also caught by
# `pre-commit run --all-files` locally; CI is the network of last resort.
#
# Job split rationale:
#   - backend: the 8 backend tools, ordered cheapest-first so signal arrives
#     before pytest's heavier I/O.
#   - frontend: only fires when frontend sources land (item 2.1+); skips
#     cleanly today because frontend/ is config-only.
#   - links: lychee against repo markdown.
#   - pre-commit: belt-and-braces — runs the full pre-commit set the same
#     way local devs do, catching wiring drift between this YAML and
#     .pre-commit-config.yaml.

name: CI

on:
  push:
    branches: [v1-rebuild]
  pull_request:
    branches: [v1-rebuild]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  UV_VERSION: "0.11.7"
  PYTHON_VERSION: "3.12"

jobs:
  backend:
    name: Backend gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Sync dev dependencies
        run: uv sync --extra dev --frozen

      - name: ruff check
        run: uv run ruff check .

      - name: ruff format --check
        run: uv run ruff format --check .

      - name: mypy --strict
        run: uv run mypy src tests scripts

      - name: vulture (with allowlist)
        run: uv run vulture src tests config/allowlists/vulture.txt

      - name: xenon (cyclomatic complexity gate)
        run: uv run xenon --max-absolute B --max-modules A --max-average A src

      - name: interrogate (docstring coverage ≥ 80%)
        run: uv run interrogate -c pyproject.toml

      - name: codespell
        run: uv run codespell --toml pyproject.toml

      - name: version alignment (pyproject.toml == openapi.json)
        # feature-13-003: asserts [project].version in pyproject.toml equals
        # info.version in docs/openapi.json.  Catches a release bump that
        # rolls one file but not the other.
        run: uv run python scripts/check_version_alignment.py

      - name: openapi spec drift
        # feature-13-001: regenerates docs/openapi.json from the live app and
        # fails if the committed file is stale.  Instructs contributors to
        # run the script and commit the result.
        run: uv run python scripts/regen_openapi.py

      - name: schema.sql drift
        # feature-13-002: applies src/bearings/db/schema.sql to a fresh
        # in-memory SQLite DB, dumps sqlite_schema, and asserts the object
        # set + normalised DDL match the source file.
        run: uv run python scripts/check_schema_drift.py

      - name: pytest with coverage
        run: uv run pytest -q --cov=bearings --cov-report=term-missing

      - name: pip-audit (CVEs)
        run: uv run pip-audit --strict .

      - name: consistency lint (item 3.1)
        # Cross-system convention guard — route function naming, error
        # response shape, SQL column ordering, Svelte component prop
        # conventions. None of these are caught by per-language tools.
        run: uv run python scripts/consistency_lint.py

  frontend:
    name: Frontend gates
    runs-on: ubuntu-latest
    # Frontend gates skip cleanly when frontend/src has no real sources yet
    # (item 0.1 state). The 'changes' step decides whether to install.
    steps:
      - uses: actions/checkout@v4

      - name: Detect real frontend sources
        id: detect
        run: |
          if find frontend/src -type f \( -name '*.ts' -o -name '*.svelte' \) | grep -q .; then
            echo "have_sources=true" >> "$GITHUB_OUTPUT"
          else
            echo "have_sources=false" >> "$GITHUB_OUTPUT"
            echo "::notice::frontend/src has no .ts/.svelte sources yet — skipping frontend gates (item 2.1 will activate them)."
          fi

      - name: Set up Node
        if: steps.detect.outputs.have_sources == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: npm install
        if: steps.detect.outputs.have_sources == 'true'
        working-directory: frontend
        run: npm ci

      - name: eslint
        if: steps.detect.outputs.have_sources == 'true'
        working-directory: frontend
        run: npm run lint

      - name: prettier --check
        if: steps.detect.outputs.have_sources == 'true'
        working-directory: frontend
        run: npm run format:check

      - name: svelte-check
        if: steps.detect.outputs.have_sources == 'true'
        working-directory: frontend
        run: npm run check

      - name: knip
        if: steps.detect.outputs.have_sources == 'true'
        working-directory: frontend
        run: npm run knip

      - name: depcheck
        if: steps.detect.outputs.have_sources == 'true'
        working-directory: frontend
        run: npm run depcheck

  e2e:
    name: Playwright E2E (item 3.1)
    runs-on: ubuntu-latest
    # The Playwright suite drives the FastAPI app + committed
    # `src/bearings/web/dist/` bundle via `scripts/e2e_server.py`. It
    # depends on the backend job's gates being green so we don't burn
    # browser time on a backend that's already known broken.
    needs: [backend]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Sync dev dependencies
        run: uv sync --extra dev --frozen

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: npm install (frontend)
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run Playwright suite
        working-directory: frontend
        env:
          CI: "true"
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14

  links:
    name: Lychee (dead-link check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress --max-retries 1 --timeout 10 './**/*.md'
          fail: true

  pre-commit:
    name: Pre-commit (all hooks, full files)
    runs-on: ubuntu-latest
    needs: [backend]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Sync dev dependencies
        run: uv sync --extra dev --frozen

      - name: Run pre-commit on all files
        # Frontend hooks no-op cleanly because frontend/node_modules is absent
        # and the wrapper script handles that path; lychee no-ops because the
        # binary isn't installed in this job (the dedicated 'links' job covers
        # it).
        run: uv run pre-commit run --all-files --show-diff-on-failure

  systemd-unit:
    name: systemd unit verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: systemd-analyze verify
        # Verify the user-unit shape against systemd's parser. Failures here
        # would mean the unit file would refuse to load on a real machine.
        run: systemd-analyze verify --user --recursive-errors=yes config/bearings-v1.service

  api-compat:
    # feature-13-004: compare docs/openapi.json against the previous SemVer
    # tag using oasdiff.  Fails on any breaking change so the CHANGELOG
    # §1.0.0 additive-only promise is machine-enforced within v1.x.
    #
    # Guard: skips when the current ref is a v0.x tag (pre-1.0 pushes should
    # not burn API-compat CI; the existing branch triggers fire on
    # refs/heads/v1-rebuild where this condition is always true, but the
    # guard protects against a future tags: [v*] trigger being added).
    name: API compatibility (oasdiff)
    runs-on: ubuntu-latest
    if: "!startsWith(github.ref, 'refs/tags/v0.')"
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history required so `git tag` can reach all SemVer tags.
          fetch-depth: 0

      - name: Find previous SemVer tag
        id: prev-tag
        run: |
          git fetch --tags --quiet
          # List tags matching v<digit>* sorted by version descending;
          # take the first entry as the most recent published release.
          PREV=$(git tag --list 'v[0-9]*' --sort=-version:refname | head -1 || true)
          if [ -z "$PREV" ]; then
            echo "No previous SemVer tag found — skipping api-compat (bootstrap run)"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "Comparing against previous tag: $PREV"
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "tag=$PREV" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract base spec from previous tag
        if: steps.prev-tag.outputs.skip == 'false'
        run: |
          git show "${{ steps.prev-tag.outputs.tag }}:docs/openapi.json" \
            > /tmp/base-openapi.json

      - name: Check for breaking API changes
        # tufin/oasdiff-action@v1 runs `oasdiff breaking` under the hood
        # and exits 1 when breaking changes are detected.  No `fail-on-diff`
        # flag means only breaking changes (not additive changes) fail the job.
        if: steps.prev-tag.outputs.skip == 'false'
        uses: tufin/oasdiff-action@v1
        with:
          base: /tmp/base-openapi.json
          revision: docs/openapi.json
