name: Feature request
description: A capability you'd like Bearings to grow.
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. The in-app **Request a feature**
        row (Settings → Help) prefills this form with your environment
        and a problem / proposal scaffold — clicking it from inside
        Bearings is the fastest path. Bearings does **not** POST any
        data anywhere on click; the button only opens this form, and
        you submit it manually after reviewing.
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Bearings version, browser UA, OS hint. The in-app button fills this in for you.
      placeholder: |
        - **Bearings version:** 0.21.0
        - **Build:** 2026-04-25T20:00:00.000Z
        - **Browser:** Mozilla/5.0 ...
        - **Platform:** Linux x86_64
        - **Language:** en-US
    validations:
      required: false
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: The user-facing pain point. Why does this need to exist?
    validations:
      required: true
  - type: textarea
    id: proposed-behavior
    attributes:
      label: Proposed behavior
      description: How would the feature work from the operator perspective?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you weighed and why they fell short.
    validations:
      required: false
  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Mock-ups, related issues, anything that helps.
    validations:
      required: false
