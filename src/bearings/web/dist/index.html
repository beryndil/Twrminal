          default: "#111827",
          "paper-light": "#faf7f0",

        var FALLBACK_THEME = "evergreen";
        var FALLBACK_HEX = "#0e131b";
        try {
          var theme = FALLBACK_THEME;

          try {

                  theme = "paper-light";
                  hex = THEME_HEX["paper-light"];
                }
              } catch (e) {
                /* matchMedia unavailable — stay on evergreen */
              }
            }
          } catch (e) {
            /* localStorage inaccessible — stay on evergreen */
          }
          document.documentElement.setAttribute("data-theme", theme);
          var meta = document.querySelector('meta[name="theme-color"]');
          if (!meta) {
            meta = document.createElement("meta");
            meta.setAttribute("name", "theme-color");
            document.head.appendChild(meta);
          }
          meta.setAttribute("content", hex);
        } catch (e) {
          /* static HTML fallbacks already in place */
        }
      })();
