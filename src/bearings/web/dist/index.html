      Logic mirrors src/lib/themes/boot.ts:runBootScript() exactly.
      The hex map must stay in sync with THEME_COLOR_HEX in
      src/lib/config.ts — the runtime drift detector in
      src/lib/themes/ThemeProvider.svelte console.warns on mismatch.
    -->
    <script>
      (function () {
        var STORAGE_KEY = "bearings-theme-v1";
        var THEME_HEX = {
          evergreen: "#0e131b",
          "midnight-glass": "#0e1729",
          default: "#111827",
          "paper-light": "#faf7f0",
        };
        var FALLBACK_THEME = "evergreen";
        var FALLBACK_HEX = "#0e131b";
        try {
          var theme = FALLBACK_THEME;
          var hex = FALLBACK_HEX;
          try {
            var stored = window.localStorage.getItem(STORAGE_KEY);
            if (stored !== null && Object.prototype.hasOwnProperty.call(THEME_HEX, stored)) {
              theme = stored;
              hex = THEME_HEX[stored];
            } else if (stored === null) {
              try {
                if (window.matchMedia("(prefers-color-scheme: light)").matches) {
                  theme = "paper-light";
                  hex = THEME_HEX["paper-light"];
                }
              } catch (e) {
                /* matchMedia unavailable — stay on evergreen */
              }
            }
          } catch (e) {
            /* localStorage inaccessible — stay on evergreen */
          }
          document.documentElement.setAttribute("data-theme", theme);
          var meta = document.querySelector('meta[name="theme-color"]');
          if (!meta) {
            meta = document.createElement("meta");
            meta.setAttribute("name", "theme-color");
            document.head.appendChild(meta);
          }
          meta.setAttribute("content", hex);
        } catch (e) {
          /* static HTML fallbacks already in place */
        }
      })();
    </script>
